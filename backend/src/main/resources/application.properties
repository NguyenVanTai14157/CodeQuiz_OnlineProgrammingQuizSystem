spring.application.name=backend
server.port=8081

# PostgreSQL Configuration
spring.datasource.url=jdbc:postgresql://localhost:5434/codequiz_db
spring.datasource.username=admin
spring.datasource.password=password123
spring.datasource.driverClassName=org.postgresql.Driver


# Hibernate properties
spring.jpa.hibernate.ddl-auto=update  
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true


# File upload properties
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=uploads

# JWT properties
codequiz.app.jwtSecret=secretKeyCodeQuizOnlineProgrammingQuizSystem2024FullStackDeveloperHighSecurityKey512Bits
codequiz.app.jwtExpirationMs=86400000
